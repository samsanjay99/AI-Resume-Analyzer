<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Deployment</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
            padding: 40px;
        }

        h1 {
            color: #667eea;
            text-align: center;
            margin-bottom: 30px;
            font-size: 28px;
        }

        .status-card {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 20px;
        }

        .progress-bar {
            width: 100%;
            height: 30px;
            background: #e0e0e0;
            border-radius: 15px;
            overflow: hidden;
            margin: 20px 0;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            transition: width 0.5s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }

        .logs {
            background: #1e1e1e;
            border-radius: 10px;
            padding: 20px;
            max-height: 300px;
            overflow-y: auto;
            margin: 20px 0;
        }

        .log-line {
            color: #00ff00;
            font-family: 'Courier New', monospace;
            margin: 5px 0;
            font-size: 14px;
        }

        .success-card {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            margin-top: 20px;
        }

        .live-url {
            background: rgba(255, 255, 255, 0.2);
            padding: 15px;
            border-radius: 10px;
            margin: 15px 0;
            word-break: break-all;
        }

        .live-url a {
            color: white;
            text-decoration: none;
            font-size: 18px;
            font-weight: 500;
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
            transition: transform 0.2s;
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        .error-card {
            background: linear-gradient(135deg, #eb3349 0%, #f45c43 100%);
            color: white;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            margin-top: 20px;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 Portfolio Deployment</h1>
        
        <div id="deploymentUI" class="hidden">
            <div class="status-card">
                <h2 id="statusText">Deploying...</h2>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressBar">0%</div>
                </div>
                <div class="spinner" id="spinner"></div>
            </div>

            <div class="logs">
                <h3 style="color: #00ff00; margin-bottom: 10px;">📡 Live Deployment Logs</h3>
                <div id="logContainer"></div>
            </div>

            <div id="successCard" class="success-card hidden">
                <h2>🎉 Your Portfolio is Live!</h2>
                <p style="margin: 15px 0;">Share this link with employers:</p>
                <div class="live-url">
                    <a id="liveUrl" href="#" target="_blank"></a>
                </div>
                <p style="font-size: 14px; opacity: 0.9;">✨ Hosted on Netlify with HTTPS and global CDN</p>
                <button class="btn" onclick="copyUrl()">📋 Copy URL</button>
            </div>

            <div id="errorCard" class="error-card hidden">
                <h2>❌ Deployment Failed</h2>
                <p id="errorMessage" style="margin-top: 15px;"></p>
                <button class="btn" onclick="location.reload()">🔄 Try Again</button>
            </div>
        </div>
    </div>

    <script>
        // Get portfolio ZIP path from URL parameter
        const urlParams = new URLSearchParams(window.location.search);
        const portfolioPath = urlParams.get('portfolio');

        if (portfolioPath) {
            startDeployment(portfolioPath);
        }

        async function startDeployment(zipPath) {
            document.getElementById('deploymentUI').classList.remove('hidden');

            try {
                // Fetch the ZIP file
                const response = await fetch(zipPath);
                const blob = await response.blob();

                // Create form data
                const formData = new FormData();
                formData.append('portfolio', blob, 'portfolio.zip');

                // Start deployment
                const deployResponse = await fetch('/deploy', {
                    method: 'POST',
                    body: formData
                });

                const data = await deployResponse.json();

                if (data.error) {
                    showError(data.error);
                    return;
                }

                // Poll for status
                pollStatus(data.deployment_id);

            } catch (error) {
                showError(error.message);
            }
        }

        async function pollStatus(deploymentId) {
            const interval = setInterval(async () => {
                try {
                    const response = await fetch(`/status/${deploymentId}`);
                    const data = await response.json();

                    // Update progress
                    const progressBar = document.getElementById('progressBar');
                    progressBar.style.width = data.progress + '%';
                    progressBar.textContent = data.progress + '%';

                    // Update logs
                    const logContainer = document.getElementById('logContainer');
                    logContainer.innerHTML = data.logs.map(log => 
                        `<div class="log-line">${log}</div>`
                    ).join('');

                    // Scroll to bottom
                    logContainer.parentElement.scrollTop = logContainer.parentElement.scrollHeight;

                    // Check status
                    if (data.status === 'success') {
                        clearInterval(interval);
                        showSuccess(data.live_url);
                    } else if (data.status === 'failed') {
                        clearInterval(interval);
                        showError(data.error || 'Unknown error');
                    }

                } catch (error) {
                    clearInterval(interval);
                    showError(error.message);
                }
            }, 1000); // Poll every second
        }

        function showSuccess(liveUrl) {
            document.getElementById('spinner').classList.add('hidden');
            document.getElementById('statusText').textContent = '✅ Deployment Complete!';
            document.getElementById('successCard').classList.remove('hidden');
            document.getElementById('liveUrl').href = liveUrl;
            document.getElementById('liveUrl').textContent = liveUrl;

            // Store URL for copying
            window.deployedUrl = liveUrl;

            // Confetti effect
            confetti();
        }

        function showError(message) {
            document.getElementById('spinner').classList.add('hidden');
            document.getElementById('statusText').textContent = '❌ Deployment Failed';
            document.getElementById('errorCard').classList.remove('hidden');
            document.getElementById('errorMessage').textContent = message;
        }

        function copyUrl() {
            navigator.clipboard.writeText(window.deployedUrl);
            alert('✅ URL copied to clipboard!');
        }

        function confetti() {
            // Simple confetti effect
            for (let i = 0; i < 50; i++) {
                const confetti = document.createElement('div');
                confetti.style.position = 'fixed';
                confetti.style.width = '10px';
                confetti.style.height = '10px';
                confetti.style.background = ['#667eea', '#764ba2', '#11998e', '#38ef7d'][Math.floor(Math.random() * 4)];
                confetti.style.left = Math.random() * window.innerWidth + 'px';
                confetti.style.top = '-10px';
                confetti.style.borderRadius = '50%';
                confetti.style.zIndex = '9999';
                document.body.appendChild(confetti);

                const fall = confetti.animate([
                    { transform: 'translateY(0) rotate(0deg)', opacity: 1 },
                    { transform: `translateY(${window.innerHeight}px) rotate(360deg)`, opacity: 0 }
                ], {
                    duration: 3000 + Math.random() * 2000,
                    easing: 'cubic-bezier(0.25, 0.46, 0.45, 0.94)'
                });

                fall.onfinish = () => confetti.remove();
            }
        }
    </script>
</body>
</html>
